version: '3.8'

services:
  # ============== MySQL 数据库 ==============
  mysql:
    image: mysql:8.0
    container_name: duo-dash-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: DuoDash@2024
      MYSQL_DATABASE: duo_dash
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - duo-dash-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pDuoDash@2024"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ============== Spring Boot 后端 ==============
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: duo-dash-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      # Spring Boot 通过环境变量自动覆盖 application.yml
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/duo_dash?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: DuoDash@2024
      SPRING_FLYWAY_ENABLED: "true"
      JAVA_OPTS: "-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0 -Xms256m"
      TZ: Asia/Shanghai
    ports:
      - "8080:8080"
    networks:
      - duo-dash-network

  # ============== React 前端 ==============
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: duo-dash-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      # 宿主机 38080 → 容器内 nginx 80
      - "38080:80"
    networks:
      - duo-dash-network

# ============== 网络 ==============
networks:
  duo-dash-network:
    driver: bridge

# ============== 数据卷 ==============
volumes:
  mysql-data:
    driver: local
