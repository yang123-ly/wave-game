spring:
  application:
    name: duo-dash-backend

  # 数据源配置 - MySQL（支持环境变量覆盖，便于 Docker 部署）
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/duo_dash?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 30000
      connection-timeout: 30000
      max-lifetime: 1800000

  # JPA 配置
  jpa:
    hibernate:
      ddl-auto: none   # 表结构完全由 Flyway 管理，不让 Hibernate 校验
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
    open-in-view: false

  # Flyway 配置
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # Jackson 配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false

# 服务器配置
server:
  port: 8080
  servlet:
    context-path: /api
  compression:
    enabled: true
    min-response-size: 1024
    mime-types: text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json

# 日志配置
logging:
  level:
    root: INFO
    com.duodash: DEBUG
    org.springframework.web: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

# JWT 配置
jwt:
  secret: duo-dash-secret-key-for-jwt-signature-must-be-at-least-256-bits-long
  expiration: 86400000  # 24 小时
  refresh-expiration: 604800000  # 7 天

# 游戏配置
game:
  # 房间配置
  room:
    max-players: 2
    timeout: 300000  # 5 分钟超时
  
  # 任务配置
  task:
    default-count: 5
    max-count: 8
    timeout: 30000  # 30 秒任务超时
  
  # 惩罚配置
  penalty:
    error-delay: 2000  # 错误操作延迟 2 秒

# 监控配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized
